# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "acab7efb14bc18e294a02a8b804d280f"
name = "Tile Project Builder"
application_url = "https://shopify-projects-app.onrender.com/"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

[access.admin]
direct_api_mode = "online"
embedded_app_direct_api_access = true

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_products,write_products"
optional_scopes = [ ]
use_legacy_install_flow = false

[auth]
redirect_urls = [ ]

[app_proxy]
url = "https://shopify-projects-app.onrender.com/api"
subpath = "projects"
prefix = "apps"

[metaobjects.app.faq]
name = "FAQ"

[metaobjects.app.faq.fields.question]
name = "Question"
type = "single_line_text_field"
required = true

[metaobjects.app.faq.fields.answer]
name = "Answer"
type = "multi_line_text_field"
required = true

[metaobjects.app.faq.fields.show_on_faq_page]
name = "Show on FAQ page"
type = "boolean"

[product.metafields.app.faq]
name = "FAQ"
description = "FAQ for this product"
type = "metaobject_reference<$app:faq>"

  [product.metafields.app.faq.access]
  admin = "merchant_read_write"

[sidekick]
extensions_summary = "Read FAQ entries stored in the app"
